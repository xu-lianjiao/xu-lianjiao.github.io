<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzles</title>
    <link rel="preload" href="fonts/jxhandwriting.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="style.css">
    <script src="connect4.js" defer></script>
</head>

<body>
    <nav class="subpage-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="work.html">Work</a>
        <a href="puzzles.html" class="active">Puzzles</a>
        <a href="pursuits.html">Other</a>
        <a href="contact.html">Contact</a>
    </nav>
    <main class="container">
        <h1>Puzzles</h1>

        <div class="puzzles-layout">
            <div class="puzzles-main-content">
                <p>Welcome to the puzzles page! More puzzles will be coming soon. In the meantime, try your hand at Connect Four against our minimax AI.</p>
            </div>

            <div class="puzzles-sidebar">
                <div class="connect4-game fade-in-up">
                    <div class="confetti-container" id="confetti-container"></div>
                    <div class="connect4-container">
                        <div class="tokens-container" id="tokens-container"></div>
                        <div class="board-frame" id="board-frame"></div>
                        <div class="columns-container" id="columns-container"></div>
                    </div>

                    <div class="game-controls">
                        <button id="reset-btn" class="c4-reset-btn" aria-label="Reset Game">
                            <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
                                <!-- Smoothed hand-drawn-ish bezier clockwise path -->
                                <path d="M 88 63 C 86 78, 68 89, 48 89 C 28 89, 11 70, 11 48 C 11 27, 29 11, 51 11 C 62 11, 73 15, 77 23 L 94 41" />
                                <!-- Smoothed hand-drawn-ish arrowhead -->
                                <path d="M 93 18 L 94 41 L 72 43" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
